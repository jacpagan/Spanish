<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conjugatronix – Spanish Conjugations</title>
    <!-- Bootstrap 5 (via CDN) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Custom CSS (css/style.css) -->
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <!-- Navbar (with brand "Conjugatronix") -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="#">Conjugatronix</a>
      </div>
    </nav>

    <!-- Jumbotron (intro) -->
    <div class="container mt-4">
      <div class="p-5 mb-4 bg-light rounded-3">
        <h1 class="display-5 fw-bold">Spanish Conjugations</h1>
         <p class="lead">Quick lookup (and analytics) for 500 Spanish verbs. Powered by Conjugatronix.</p>
      </div>
    </div>

    <!-- Verb Search (or dropdown) -->
    <div class="container mt-4">
      <div class="row">
         <div class="col-md-6 mx-auto">
            <select class="form-select" id="roots" aria-label="Select a verb"></select>
         </div>
      </div>
    </div>

    <!-- Conjugations Container (with "conjugations" div) -->
    <div class="container mt-4">
      <div class="row">
         <div class="col-md-12">
            <div id="translation" class="alert alert-info" style="display:none;"></div>
            <div id="conjugations" class="conjugations"></div>
         </div>
      </div>
    </div>

    <!-- Footer (with "Powered by Conjugatronix") -->
    <footer class="container mt-5 py-3 text-center text-muted">
       <p>Powered by Conjugatronix – Open Source Spanish Conjugations Tool</p>
    </footer>

    <!-- JS (defer'd) -->
    <script defer src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script defer src="js/verbs.js"></script>
    <script defer src="js/definitions.js"></script>
    <script defer src="js/script.js"></script>
  </body>
</html>
